name: Lint
on:
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Dependencies
        run: npm ci

      - name: Prettier
        run: npm run prettier:check

      - name: Lint
        run: npm run lint

      - name: Stylelint
        run: npm run stylelint:check
